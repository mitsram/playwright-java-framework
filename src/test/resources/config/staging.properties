# ── Staging Environment Configuration ────────────────────────────
# Application URLs
base.url=https://staging.example.com
api.base.url=https://staging.example.com/api

# Browser settings
browser=chromium
headless=true
slow.mo=0

# Viewport
viewport.width=1920
